name: Build Android APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: |
          bun install
          cd mobile && bun install

      - name: Generate native Android project
        working-directory: mobile
        run: |
          echo "=== Checking mobile directory ==="
          ls -la
          echo "=== Running expo prebuild ==="
          npx expo prebuild --clean --platform android --verbose
          echo "=== Checking if android directory exists ==="
          ls -la
          if [ ! -d "android" ]; then
            echo "ERROR: Android directory not created!"
            echo "=== Checking for error logs ==="
            find . -name "*.log" -exec cat {} \;
            exit 1
          fi
          echo "=== Android directory created successfully ==="

      - name: Build release APK
        working-directory: mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mv mobile/android/app/build/outputs/apk/release/app-release.apk \
             mobile/android/app/build/outputs/apk/release/camdetect-android-${{ steps.sha.outputs.short }}.apk

      - name: Delete old latest release
        run: |
          gh release delete latest --yes || true
          git push --delete origin latest || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: CamDetect Latest Build
          body: |
            ## CamDetect Android Latest Build
            
            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
            **Date:** ${{ github.event.head_commit.timestamp }}
            
            ### Download
            - `camdetect-android-${{ steps.sha.outputs.short }}.apk`
            
            ---
            This release is automatically updated on every push to main.
          files: mobile/android/app/build/outputs/apk/release/camdetect-android-${{ steps.sha.outputs.short }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
