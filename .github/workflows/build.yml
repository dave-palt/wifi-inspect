name: Build Android APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            mobile/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package.json', 'mobile/package.json') }}
          restore-keys: node-modules-${{ runner.os }}-

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install dependencies
        run: |
          echo "Installing root dependencies..."
          npm install
          echo "Installing mobile dependencies..."
          cd mobile && npm install

      - name: Generate native Android project
        working-directory: mobile
        run: npx expo prebuild --clean --platform android

      - name: Verify native module autolinking
        run: |
          echo "Verifying NetworkScanner module was autolinked..."
          if grep -q "NetworkScannerPackage" mobile/android/app/src/main/java/com/camdetect/app/MainApplication.java; then
            echo "✅ NetworkScannerPackage found in MainApplication.java"
          else
            echo "⚠️ NetworkScannerPackage not found - checking autolinking..."
            cat mobile/android/app/src/main/java/com/camdetect/app/MainApplication.java | head -50
          fi
          if [ -d "mobile/android/app/src/main/java/com/camdetect/app" ]; then
            echo "✅ Native module files present:"
            ls -la mobile/android/app/src/main/java/com/camdetect/app/*.java 2>/dev/null || echo "No Java files found"
          fi

      - name: Build release APK
        working-directory: mobile/android
        run: |
          echo "Building APK..."
          ./gradlew assembleRelease --stacktrace
        env:
          NODE_ENV: production

      - name: Find APK location
        id: find-apk
        run: |
          echo "Searching for APK files..."
          find mobile/android -name "*.apk" -type f || echo "No APKs found"
          APK_PATH=$(find mobile/android/app/build/outputs/apk -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ No APK found!"
            echo "Listing build outputs:"
            ls -la mobile/android/app/build/outputs/ || echo "No outputs directory"
            exit 1
          fi
          echo "✅ APK found at: $APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Verify APK was built
        id: verify-apk
        run: |
          APK_PATH="${{ steps.find-apk.outputs.apk_path }}"
          echo "Checking APK: $APK_PATH"
          if [ ! -f "$APK_PATH" ]; then
            echo "❌ ERROR: APK not found!"
            exit 1
          fi
          echo "✅ APK found"
          ls -lh "$APK_PATH"
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-apk-${{ steps.sha.outputs.short }}
          path: mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          APK_PATH="${{ steps.find-apk.outputs.apk_path }}"
          APK_DIR=$(dirname "$APK_PATH")
          mkdir -p mobile/android/app/build/outputs/apk/release
          cp "$APK_PATH" mobile/android/app/build/outputs/apk/release/camdetect-android-${{ steps.sha.outputs.short }}.apk
          echo "APK renamed to: camdetect-android-${{ steps.sha.outputs.short }}.apk"

      - name: Delete old latest release
        run: |
          gh release delete latest --yes || true
          git push --delete origin latest || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: CamDetect Latest Build
          body: |
            ## CamDetect Android Latest Build
            
            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref_name }}`
            **Built:** ${{ github.event.head_commit.timestamp }}
            **APK Size:** ${{ steps.verify-apk.outputs.apk_size }}
            
            ### 📱 Download
            - `camdetect-android-${{ steps.sha.outputs.short }}.apk`
            
            ### 🚀 What's Included
            - WiFi network scanner
            - IP camera detection
            - Threat analysis
            - NativeWind UI
            
            ### ⚙️ Requirements
            - Android 6.0+ (API 23+)
            - Location permission (for WiFi scanning)
            
            ---
            Built with React Native + Expo
          files: mobile/android/app/build/outputs/apk/release/camdetect-android-${{ steps.sha.outputs.short }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ steps.sha.outputs.short }}
          path: |
            mobile/android/app/build/reports
            mobile/android/**/build.log
          retention-days: 7
