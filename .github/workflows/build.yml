name: Build Android APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install dependencies
        run: npm install

      - name: Cache Metro bundler
        uses: actions/cache@v4
        with:
          path: |
            mobile/.expo
            mobile/node_modules/.cache
            ~/.expo/metro-cache
          key: metro-${{ runner.os }}-${{ hashFiles('mobile/package.json', 'package.json') }}
          restore-keys: |
            metro-${{ runner.os }}-

      - name: Generate native Android project
        working-directory: mobile
        run: npx expo prebuild --clean --platform android

      - name: Build release APK
        working-directory: mobile/android
        run: ./gradlew assembleRelease
        env:
          NODE_ENV: production

      - name: Verify APK was built
        id: verify-apk
        run: |
          echo "Checking for APK..."
          if [ ! -f "mobile/android/app/build/outputs/apk/release/app-release.apk" ]; then
            echo "❌ ERROR: APK not found!"
            echo "Listing build outputs:"
            find mobile/android/app/build/outputs -name "*.apk" || echo "No APK files found"
            exit 1
          fi
          echo "✅ APK found"
          ls -lh mobile/android/app/build/outputs/apk/release/app-release.apk
          APK_SIZE=$(du -h mobile/android/app/build/outputs/apk/release/app-release.apk | cut -f1)
          echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-apk-${{ steps.sha.outputs.short }}
          path: mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mv mobile/android/app/build/outputs/apk/release/app-release.apk \
             mobile/android/app/build/outputs/apk/release/camdetect-android-${{ steps.sha.outputs.short }}.apk

      - name: Delete old latest release
        run: |
          gh release delete latest --yes || true
          git push --delete origin latest || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: CamDetect Latest Build
          body: |
            ## CamDetect Android Latest Build
            
            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref_name }}`
            **Built:** ${{ github.event.head_commit.timestamp }}
            **APK Size:** ${{ steps.verify-apk.outputs.apk_size }}
            
            ### 📱 Download
            - `camdetect-android-${{ steps.sha.outputs.short }}.apk`
            
            ### 🚀 What's Included
            - WiFi network scanner
            - IP camera detection
            - Threat analysis
            - NativeWind UI
            
            ### ⚙️ Requirements
            - Android 6.0+ (API 23+)
            - Location permission (for WiFi scanning)
            
            ---
            Built with React Native + Expo
          files: mobile/android/app/build/outputs/apk/release/camdetect-android-${{ steps.sha.outputs.short }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ steps.sha.outputs.short }}
          path: |
            mobile/android/app/build/reports
            mobile/android/**/build.log
          retention-days: 7
