name: Release Versioned Build

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: |
            node_modules
            mobile/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json', 'mobile/package-lock.json') }}
          restore-keys: node-modules-${{ runner.os }}-

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          echo "Installing root dependencies..."
          npm install
          echo "Installing mobile dependencies..."
          cd mobile && npm install

      - name: Generate native Android project
        working-directory: mobile
        run: npx expo prebuild --clean --platform android

      - name: Build release APK
        working-directory: mobile/android
        run: |
          echo "Building APK..."
          ./gradlew assembleRelease --stacktrace
        env:
          NODE_ENV: production

      - name: Find APK location
        id: find-apk
        run: |
          echo "Searching for APK files..."
          find mobile/android -name "*.apk" -type f || echo "No APKs found"
          APK_PATH=$(find mobile/android/app/build/outputs/apk -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ No APK found!"
            echo "Listing build outputs:"
            ls -la mobile/android/app/build/outputs/ || echo "No outputs directory"
            exit 1
          fi
          echo "✅ APK found at: $APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Verify APK was built
        id: verify-apk
        run: |
          APK_PATH="${{ steps.find-apk.outputs.apk_path }}"
          echo "Checking APK: $APK_PATH"
          if [ ! -f "$APK_PATH" ]; then
            echo "❌ ERROR: APK not found!"
            exit 1
          fi
          echo "✅ APK found"
          ls -lh "$APK_PATH"
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-apk-${{ steps.version.outputs.version }}
          path: mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          APK_PATH="${{ steps.find-apk.outputs.apk_path }}"
          APK_DIR=$(dirname "$APK_PATH")
          mkdir -p mobile/android/app/build/outputs/apk/release
          cp "$APK_PATH" mobile/android/app/build/outputs/apk/release/camdetect-${{ steps.version.outputs.version }}.apk
          echo "APK renamed to: camdetect-${{ steps.version.outputs.version }}.apk"

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          name: CamDetect ${{ steps.version.outputs.version }}
          body: |
            ## CamDetect ${{ steps.version.outputs.version }}
            
            **Release Date:** ${{ github.event.head_commit.timestamp }}
            **APK Size:** ${{ steps.verify-apk.outputs.apk_size }}
            
            ### 📱 Downloads
            - **Android APK:** `camdetect-${{ steps.version.outputs.version }}.apk`
            
            ### 🚀 What's Included
            - WiFi network scanner
            - IP camera detection
            - Threat analysis
            - NativeWind UI
            
            ### ⚙️ Requirements
            - Android 6.0+ (API 23+)
            - Location permission (for WiFi scanning)
            
            ### 📲 Installation
            1. Download the APK
            2. Enable "Install from unknown sources" on your Android device
            3. Open the APK and follow the installation prompts
            
            ---
            [View full changelog](https://github.com/${{ github.repository }}/commits/${{ steps.version.outputs.version }})
          files: mobile/android/app/build/outputs/apk/release/camdetect-${{ steps.version.outputs.version }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ steps.version.outputs.version }}
          path: |
            mobile/android/app/build/reports
            mobile/android/**/build.log
          retention-days: 30
