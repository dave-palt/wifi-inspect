version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: camdetect-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: camdetect
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: ../Dockerfile
    container_name: camdetect-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/camdetect
      PORT: 3000
      JWT_SECRET: dev-secret-change-in-production
    ports:
      - "3000:3000"

volumes:
  postgres_data:
